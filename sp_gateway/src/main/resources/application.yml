server:
  port: 10010
eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:10086/eureka
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    instance-id: 192.168.1.4:10010
spring:
  application:
    name: zuul-service

zuul:
  prefix: /api
  routes:
    item-service: /item/**
#zuul:
#  routes:
#    user-service: /user-service/**
##      serviceId: user-service

#定义全局的线程隔离时长
hystrix:
  command:
    default:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 5000
#负载均衡
ribbon:
  ConnectionTimeout: 1000  #ribbon链接的超时时长
  ReadTimeout: 3500  #ribbon读取超时时长
  MaxAutoRetries: 0  #当前服务重试次数
  MaxAutoRetriesNextServer: 0  #切换服务重试次数

